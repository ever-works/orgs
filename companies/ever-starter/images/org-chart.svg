<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 346" role="img" aria-label="Ever Starter Co org chart">
  <style>
    .node { fill: #ffffff; stroke: #4f46e5; stroke-width: 1.25; }
    .root { fill: #4f46e5; stroke: #4f46e5; stroke-width: 1.25; }
    .link { fill: none; stroke: #4f46e5; stroke-width: 1.5; stroke-opacity: 0.55; }
    .name { font: 600 14px system-ui, sans-serif; fill: #1f2937; text-anchor: middle; }
    .title { font: 400 11px system-ui, sans-serif; fill: #6b7280; text-anchor: middle; }
    .rootname { font: 600 14px system-ui, sans-serif; fill: #ffffff; text-anchor: middle; }
    .roottitle { font: 400 11px system-ui, sans-serif; fill: #e0e7ff; text-anchor: middle; }
  </style>

  <!-- links: ceo -> pm, marketer -->
  <path class="link" d="M342 76 V113 H155 V150" />
  <path class="link" d="M342 76 V113 H530 V150" />
  <!-- links: pm -> coder, researcher -->
  <path class="link" d="M155 206 V243 H80 V280" />
  <path class="link" d="M155 206 V243 H230 V280" />
  <!-- links: marketer -> copywriter, sales, support -->
  <path class="link" d="M530 206 V243 H380 V280" />
  <path class="link" d="M530 206 V243 H530 V280" />
  <path class="link" d="M530 206 V243 H680 V280" />

  <!-- row 1: ceo -->
  <rect class="root" x="272" y="20" width="140" height="56" rx="10" />
  <text class="rootname" x="342" y="44">Nova</text>
  <text class="roottitle" x="342" y="62">CEO</text>

  <!-- row 2: pm, marketer -->
  <rect class="node" x="85" y="150" width="140" height="56" rx="10" />
  <text class="name" x="155" y="174">Harper</text>
  <text class="title" x="155" y="192">Product Manager</text>

  <rect class="node" x="460" y="150" width="140" height="56" rx="10" />
  <text class="name" x="530" y="174">Vega</text>
  <text class="title" x="530" y="192">Head of Growth</text>

  <!-- row 3: coder, researcher, copywriter, sales, support -->
  <rect class="node" x="10" y="280" width="140" height="56" rx="10" />
  <text class="name" x="80" y="304">Kai</text>
  <text class="title" x="80" y="322">Engineer</text>

  <rect class="node" x="160" y="280" width="140" height="56" rx="10" />
  <text class="name" x="230" y="304">Sage</text>
  <text class="title" x="230" y="322">Researcher</text>

  <rect class="node" x="310" y="280" width="140" height="56" rx="10" />
  <text class="name" x="380" y="304">Lyric</text>
  <text class="title" x="380" y="322">Copywriter</text>

  <rect class="node" x="460" y="280" width="140" height="56" rx="10" />
  <text class="name" x="530" y="304">Dash</text>
  <text class="title" x="530" y="322">Sales Lead</text>

  <rect class="node" x="610" y="280" width="140" height="56" rx="10" />
  <text class="name" x="680" y="304">Juno</text>
  <text class="title" x="680" y="322">Support Lead</text>
</svg>
