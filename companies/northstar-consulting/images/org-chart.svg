  <!-- market-analyst -->
  <rect class="node" x="234" y="260" width="190" height="58" rx="10" />
  <text class="name" x="329" y="284">Ingrid Voss</text>
  <text class="role" x="329" y="302">Market Analyst</text>

  <!-- pricing-analyst -->
  <rect class="node" x="468" y="260" width="190" height="58" rx="10" />
  <text class="name" x="563" y="284">Theo Marsh</text>
  <text class="role" x="563" y="302">Pricing Analyst</text>
