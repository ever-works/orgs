<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" role="img" aria-label="Northstar Product Consulting org chart">
  <style>
    .node { fill: #ffffff; stroke: #4f46e5; stroke-width: 1.5; }
    .link { fill: none; stroke: #4f46e5; stroke-width: 1.5; stroke-opacity: 0.55; }
    .name { font: 600 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #111827; text-anchor: middle; }
    .role { font: 400 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6b7280; text-anchor: middle; }
  </style>

  <!-- connectors -->
  <path class="link" d="M392,78 V109 H222 V140" />
  <path class="link" d="M392,78 V109 H563 V140" />
  <path class="link" d="M222,198 V229 H115 V260" />
  <path class="link" d="M222,198 V229 H329 V260" />
  <path class="link" d="M563,198 V260" />

  <!-- managing-partner (root) -->
  <rect class="node" x="297" y="20" width="190" height="58" rx="10" />
  <text class="name" x="392" y="44">Margot Hale</text>
  <text class="role" x="392" y="62">Managing Partner</text>

  <!-- product-strategist -->
  <rect class="node" x="127" y="140" width="190" height="58" rx="10" />
  <text class="name" x="222" y="164">Priya Sen</text>
  <text class="role" x="222" y="182">Principal Product Strategist</text>

  <!-- roadmap-planner -->
  <rect class="node" x="468" y="140" width="190" height="58" rx="10" />
  <text class="name" x="563" y="164">Dana Whitfield</text>
