<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 352" role="img" aria-label="Ledgerline Capital org chart">
  <style>
    .node { fill: #ffffff; stroke: #4f46e5; stroke-width: 1.5; }
