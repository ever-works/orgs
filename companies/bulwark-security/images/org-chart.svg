  <!-- root: ciso -->
  <rect x="355" y="20" width="190" height="68" rx="10" fill="#4f46e5" />
  <text x="450" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Halvard Strand</text>
  <text x="450" y="62" text-anchor="middle" font-size="10" fill="#e0e7ff">Chief Information</text>
  <text x="450" y="75" text-anchor="middle" font-size="10" fill="#e0e7ff">Security Officer</text>

  <!-- appsec-auditor -->
  <rect x="18" y="148" width="160" height="68" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-opacity="0.45" />
  <text x="98" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Imani Delacroix</text>
  <text x="98" y="190" text-anchor="middle" font-size="10" fill="#6b7280">Application Security</text>
  <text x="98" y="203" text-anchor="middle" font-size="10" fill="#6b7280">Auditor</text>

  <!-- infra-auditor -->
  <rect x="194" y="148" width="160" height="68" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-opacity="0.45" />
  <text x="274" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Rasmus Kilde</text>
  <text x="274" y="190" text-anchor="middle" font-size="10" fill="#6b7280">Infrastructure Security</text>
  <text x="274" y="203" text-anchor="middle" font-size="10" fill="#6b7280">Auditor</text>

