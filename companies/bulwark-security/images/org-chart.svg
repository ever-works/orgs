<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- connectors -->
  <g stroke="#4f46e5" stroke-width="1.5" fill="none" stroke-opacity="0.6">
    <line x1="450" y1="88" x2="450" y2="118" />
    <line x1="98" y1="118" x2="802" y2="118" />
    <line x1="98" y1="118" x2="98" y2="148" />
    <line x1="274" y1="118" x2="274" y2="148" />
    <line x1="450" y1="118" x2="450" y2="148" />
    <line x1="626" y1="118" x2="626" y2="148" />
    <line x1="802" y1="118" x2="802" y2="148" />
